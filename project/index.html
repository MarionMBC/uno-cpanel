<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1320, initial-scale=1"/>
  <title>Panel de Combustibles · UNO Guaimaca Centro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#0a1530"/>
      <g transform="translate(20,20)">
        <rect x="0" y="0" width="36" height="60" rx="3" fill="#0f1f3d" stroke="#fbbf24" stroke-width="1.4"/>
        <rect x="3" y="4" width="30" height="10" rx="1.5" fill="#fbbf24"/>
        <rect x="3" y="18" width="30" height="9" rx="1" fill="#0a0f1c"/>
        <line x1="0" y1="40" x2="-8" y2="40" stroke="#94a3b8" stroke-width="2"/>
        <line x1="36" y1="40" x2="44" y2="40" stroke="#94a3b8" stroke-width="2"/>
      </g>
    </svg>
  </template>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: #0f172a;
      background:
        radial-gradient(ellipse at top left, #1a2952 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, #0c1a3d 0%, transparent 50%),
        #050a1a;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: 'cv11', 'ss01';
    }
    code, kbd, .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    button { font-family: inherit; }
    input, select, textarea { font-family: inherit; }
    input::placeholder { color: #94a3b8; }
    .card.hov { transition: transform .15s, box-shadow .15s; }
    .card.hov:hover { transform: translateY(-1px); box-shadow: 0 0 0 1px #d1d5db, 0 6px 16px rgba(15,23,42,.06); }
    /* hide scrollbar visuals but keep scrolling */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(15,31,61,.18); border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    /* responsive: scale down on smaller screens */
    @media (max-width: 1340px) {
      body { padding: 0; }
      #root { transform-origin: top center; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="overlays.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="screens2.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
